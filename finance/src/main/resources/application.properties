spring.application.name=finance
spring.profiles.default=dev

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-32-bytes-minimum}
app.security.jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
app.security.jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
app.security.jwt.password-reset-expiration-seconds=${JWT_PASSWORD_RESET_EXPIRATION_SECONDS:3600}
